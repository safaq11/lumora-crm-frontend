<div class="page">

    <div class="header">

        <h2>Lead Type Management</h2>

    </div>

    <div class="form">

        <mat-form-field appearance="outline">

            <mat-label>Name</mat-label>

            <input
                matInput
                [(ngModel)]="leadType.name">

        </mat-form-field>

        <mat-form-field appearance="outline">

            <mat-label>Description</mat-label>

            <input
                matInput
                [(ngModel)]="leadType.description">

        </mat-form-field>

        <button mat-raised-button
            color="primary"
            (click)="saveLeadType()">
            {{isEditMode ? 'Update Lead Type' : 'Add Lead Type'}}
        </button>

    </div>

    <table mat-table [dataSource]="leadTypes">

        <ng-container matColumnDef="id">

            <th mat-header-cell *matHeaderCellDef>ID</th>

            <td mat-cell *matCellDef="let row">
                {{row.id}}
            </td>

        </ng-container>

        <ng-container matColumnDef="name">

            <th mat-header-cell *matHeaderCellDef>Name</th>

            <td mat-cell *matCellDef="let row">
                {{row.name}}
            </td>

        </ng-container>

        <ng-container matColumnDef="description">

            <th mat-header-cell *matHeaderCellDef>Description</th>

            <td mat-cell *matCellDef="let row">
                {{row.description}}
            </td>

        </ng-container>

        <ng-container matColumnDef="actions">

            <th mat-header-cell *matHeaderCellDef>Actions</th>

            <td mat-cell *matCellDef="let row">

                <button
                  mat-icon-button
                  color="primary" (click)="editLeadType(row)">
                  <mat-icon>edit</mat-icon>
                </button>
                <button
                   mat-icon-button
                   color="warn"
                   (click)="deleteLeadType(row.id!)">
                   <mat-icon>delete</mat-icon>
                </button>

            </td>

        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

</div>
