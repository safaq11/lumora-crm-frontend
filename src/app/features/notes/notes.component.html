<div class="page">

    <!-- ======================================= -->
    <!-- Page Header -->
    <!-- ======================================= -->

    <div class="header">

        <h2>Notes Management</h2>

    </div>

    <!-- ======================================= -->
    <!-- Notes Table -->
    <!-- ======================================= -->

    <mat-card class="table-card">

        <div class="table-header">

            <h3>All Notes</h3>

        </div>

        <table
            mat-table
            [dataSource]="notes">

            <!-- ================= ID ================= -->

            <ng-container matColumnDef="id">

                <th mat-header-cell *matHeaderCellDef>

                    ID

                </th>

                <td mat-cell *matCellDef="let row">

                    {{row.id}}

                </td>

            </ng-container>

            <!-- ============== Customer ============== -->

            <ng-container matColumnDef="customerName">

                <th mat-header-cell *matHeaderCellDef>

                    Customer

                </th>

                <td mat-cell *matCellDef="let row">

                    {{row.customerName}}

                </td>

            </ng-container>

            <!-- ================= Note ================= -->

            <ng-container matColumnDef="note">

                <th mat-header-cell *matHeaderCellDef>

                    Note

                </th>

                <td mat-cell *matCellDef="let row">

                    {{row.note}}

                </td>

            </ng-container>

            <!-- ============ Created Date ============= -->

            <ng-container matColumnDef="createdDate">

                <th mat-header-cell *matHeaderCellDef>

                    Created Date

                </th>

                <td mat-cell *matCellDef="let row">

                    {{row.createdDate | date:'dd MMM yyyy HH:mm'}}

                </td>

            </ng-container>

            <!-- ============== Actions =============== -->

            <ng-container matColumnDef="actions">

                <th mat-header-cell *matHeaderCellDef>

                    Actions

                </th>

                <td mat-cell *matCellDef="let row">

                    <button
                        mat-icon-button
                        color="primary"
                        (click)="editNote(row)">

                        <mat-icon>edit</mat-icon>

                    </button>

                    <button
                        mat-icon-button
                        color="warn"
                        (click)="deleteNote(row.id!)">

                        <mat-icon>delete</mat-icon>

                    </button>

                </td>

            </ng-container>

            <!-- Header Row -->

            <tr
                mat-header-row
                *matHeaderRowDef="displayedColumns">

            </tr>

            <!-- Data Row -->

            <tr
                mat-row
                *matRowDef="let row; columns: displayedColumns;">

            </tr>

        </table>

    </mat-card>
        <!-- ======================================= -->
    <!-- Add / Edit Note Form -->
    <!-- ======================================= -->

    <mat-card class="form-card">

        <div class="form-header">

            <h3>

                {{isEditMode ? 'Update Note' : 'Add New Note'}}

            </h3>

        </div>

        <div class="form-grid">

            <!-- ================= Customer ================= -->

            <mat-form-field appearance="outline">

                <mat-label>Customer</mat-label>

                <mat-select
                    [(ngModel)]="note.customerLeadId">

                    <mat-option
                        *ngFor="let customer of customerLeads"
                        [value]="customer.id">

                        {{customer.customerName}}

                    </mat-option>

                </mat-select>

            </mat-form-field>

            <!-- Empty column for responsive layout -->

            <div></div>

            <!-- ================= Note ================= -->

            <mat-form-field
                appearance="outline"
                class="full-width">

                <mat-label>Note</mat-label>

                <textarea
                    matInput
                    rows="6"
                    [(ngModel)]="note.note">

                </textarea>

            </mat-form-field>

        </div>

        <!-- ======================================= -->
        <!-- Buttons -->
        <!-- ======================================= -->

        <div class="button-group">

            <button
                mat-raised-button
                color="primary"
                (click)="saveNote()">

                {{isEditMode ? 'Update Note' : 'Save Note'}}

            </button>

            <button
                mat-raised-button
                color="warn"
                type="button"
                (click)="resetForm()">

                Reset

            </button>

        </div>

    </mat-card>

</div>
