<!-- ===================================================== -->
<!--                 PROFILE PAGE CONTAINER                -->
<!-- ===================================================== -->

<div class="profile-container">

    <!-- ================================================ -->
    <!--                PAGE TITLE                        -->
    <!-- ================================================ -->

    <div class="page-header">

        <h1>👤 My Profile</h1>

        <p>
            View and manage your account information.
        </p>

    </div>

    <!-- ================================================ -->
    <!--              LOADING MESSAGE                     -->
    <!-- ================================================ -->

    <div
    *ngIf="loading"
    class="loading">

        Loading Profile...

    </div>

    <!-- ================================================ -->
    <!--                PROFILE CARD                      -->
    <!-- ================================================ -->

    <div
    class="profile-card"
    *ngIf="!loading">

        <!-- ============================================ -->
        <!--               PROFILE HEADER                  -->
        <!-- ============================================ -->

        <div class="profile-header">

            <!-- Avatar -->

            <div class="avatar">

                {{ user.fullName.charAt(0) }}

            </div>

            <!-- User Details -->

            <div class="profile-details">

                <h2>

                    {{ user.fullName }}

                </h2>

                <p>

                    {{ user.role }}

                </p>

            </div>

            <!-- Edit Button -->

            <button
            class="edit-btn"
            *ngIf="!editMode"
            (click)="enableEdit()">

                ✏️ Edit Profile

            </button>

        </div>

        <hr>
                <!-- ============================================ -->
        <!--             PROFILE INFORMATION              -->
        <!-- ============================================ -->

        <div class="profile-grid">

            <!-- ========== Full Name ========== -->

            <div class="form-group">

                <label>Full Name</label>

                <input
                type="text"
                [(ngModel)]="user.fullName"
                [readonly]="!editMode">

            </div>

            <!-- ========== Username ========== -->

            <div class="form-group">

                <label>Username</label>

                <input
                type="text"
                [value]="user.username"
                readonly>

            </div>

            <!-- ========== Email ========== -->

            <div class="form-group">

                <label>Email</label>

                <input
                type="email"
                [(ngModel)]="user.email"
                [readonly]="!editMode">

            </div>

            <!-- ========== Mobile ========== -->

            <div class="form-group">

                <label>Mobile Number</label>

                <input
                type="text"
                [(ngModel)]="user.mobile"
                [readonly]="!editMode">

            </div>

            <!-- ========== Role ========== -->

            <div class="form-group">

                <label>Role</label>

                <input
                type="text"
                [value]="user.role"
                readonly>

            </div>

            <!-- ========== Created Date ========== -->

            <div class="form-group">

                <label>Created On</label>

                <input
                type="text"
                [value]="user.createdDate | date:'dd MMM yyyy, hh:mm a'"
                readonly>

            </div>

            <!-- ========== Last Login ========== -->

            <div class="form-group full-width">

                <label>Last Login</label>

                <input
                type="text"
                [value]="user.lastLogin ? (user.lastLogin | date:'dd MMM yyyy, hh:mm a') : 'Never Logged In'"
                readonly>

            </div>

        </div>

        <!-- ============================================ -->
        <!--               ACTION BUTTONS                 -->
        <!-- ============================================ -->

        <div
        class="button-group"
        *ngIf="editMode">

            <button
            class="save-btn"
            (click)="saveProfile()">

                💾 Save Changes

            </button>

            <button
            class="cancel-btn"
            (click)="cancelEdit()">

                Cancel

            </button>

        </div>

    </div>

</div>
